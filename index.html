<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON OVERDRIVE: CYBERCORE - REDUX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-yellow: #fff200;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }

        #game-canvas {
            display: block;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
            z-index: 10;
        }

        .menu-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(12px);
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .neon-text-blue {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .neon-btn {
            pointer-events: auto;
            background: rgba(0, 243, 255, 0.05);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .neon-btn:hover:not(:disabled) {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
            transform: translateY(-2px);
        }

        .neon-btn:disabled {
            border-color: #333;
            color: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .hud-bar {
            width: clamp(140px, 20vw, 220px);
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        #hp-fill { background: linear-gradient(90deg, #ff0055, #ff00ff); box-shadow: 0 0 15px var(--neon-pink); }
        #shield-fill { background: linear-gradient(90deg, #00d2ff, #3a7bd5); box-shadow: 0 0 15px var(--neon-blue); }

        #wave-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            font-size: clamp(3rem, 10vw, 7rem);
        }

        .animate-wave { animation: wave-announce 2.2s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        @keyframes wave-announce {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(calc(50vw - 120px), calc(-50vh + 80px)) scale(0.2); opacity: 0; }
        }

        .glitch-text { animation: glitch 3s infinite; }
        @keyframes glitch {
            0%, 100% { transform: none; }
            10% { transform: skew(-0.5deg, -0.9deg); }
            30% { transform: skew(0.8deg, -0.1deg); }
            55% { transform: skew(-1deg, 0.2deg); }
        }

        .upgrade-card {
            background: rgba(20, 20, 25, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.1);
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
            transition: all 0.3s;
        }

        .upgrade-card:hover { border-color: var(--neon-blue); background: rgba(30, 30, 40, 0.8); }

        .tab-btn {
            pointer-events: auto;
            padding: 12px 24px;
            font-weight: bold;
            color: #555;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active { color: var(--neon-blue); border-bottom-color: var(--neon-blue); }

        .joystick-container {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: auto;
            display: none;
        }
        #move-joystick { left: 40px; }
        #aim-joystick { right: 40px; }
        .joystick-knob {
            position: absolute;
            top: 50%; left: 50%;
            width: 50px; height: 50px;
            background: rgba(0, 243, 255, 0.3);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
    </style>
</head>
<body class="custom-scrollbar">

    <canvas id="game-canvas"></canvas>

    <div id="wave-alert" class="orbitron font-black neon-text-blue italic uppercase tracking-tighter">WAVE 1</div>

    <div id="move-joystick" class="joystick-container"><div class="joystick-knob"></div></div>
    <div id="aim-joystick" class="joystick-container"><div class="joystick-knob"></div></div>

    <!-- Főmenü -->
    <div id="main-menu" class="menu-overlay">
        <div class="mb-4 flex flex-col items-center">
            <h1 class="orbitron text-6xl md:text-8xl font-black glitch-text tracking-tighter italic uppercase leading-none">Neon</h1>
            <h1 class="orbitron text-4xl md:text-6xl font-black neon-text-blue tracking-widest uppercase leading-none">Overdrive</h1>
            <p class="text-[10px] tracking-[0.5em] text-slate-500 mt-2 font-bold uppercase">Cybercore Protocol v2.6</p>
        </div>
        
        <div class="flex flex-col md:flex-row gap-6 mb-10">
            <button onclick="startGame()" class="neon-btn orbitron px-12">Engage</button>
            <button onclick="openLobby()" class="neon-btn orbitron border-purple-500 text-purple-500 hover:bg-purple-500">Upgrades</button>
        </div>

        <div class="currency-display orbitron text-2xl mb-8 flex items-center">
            <i class="fas fa-coins mr-3 text-yellow-400"></i> <span id="global-coins">0</span> <span class="text-xs ml-2 opacity-60">CREDITS</span>
        </div>
    </div>

    <!-- Fejlesztési Menü -->
    <div id="lobby-menu" class="menu-overlay" style="display: none;">
        <h2 class="orbitron text-3xl font-black mb-2 neon-text-blue uppercase italic">Tech Hub</h2>
        
        <div class="currency-display orbitron text-xl mb-6">
            <i class="fas fa-coins mr-2 text-yellow-400"></i> <span id="lobby-coins">0</span>
        </div>

        <div class="flex gap-4 mb-8">
            <button onclick="switchTab('player')" id="tab-player" class="tab-btn active uppercase">Chassis</button>
            <button onclick="switchTab('bots')" id="tab-bots" class="tab-btn uppercase">Bot Tech <i id="lock-icon" class="fas fa-lock ml-2 text-xs opacity-50"></i></button>
        </div>

        <div id="player-upgrades" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10 max-h-[55vh] overflow-y-auto px-6 w-full max-w-6xl pointer-events-auto custom-scrollbar"></div>
        <div id="bot-upgrades" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-10 max-h-[50vh] overflow-y-auto px-6 w-full max-w-6xl pointer-events-auto" style="display: none;"></div>

        <button onclick="closeLobby()" class="neon-btn orbitron border-red-500 text-red-500 hover:bg-red-500">Back</button>
    </div>

    <!-- Game Over -->
    <div id="game-over" class="menu-overlay" style="display: none; opacity: 0;">
        <h2 class="orbitron text-5xl font-black mb-4 text-red-500 uppercase italic">Core Failure</h2>
        <div id="final-score" class="text-3xl mb-2 orbitron">000,000</div>
        <div id="session-coins" class="text-xl mb-12 orbitron text-yellow-400">+0 CREDITS</div>
        <div class="flex flex-col gap-4 w-full max-w-xs">
            <button onclick="startGame()" class="neon-btn orbitron w-full">Reboot</button>
            <button onclick="returnToMenu()" class="neon-btn orbitron border-slate-500 text-slate-500 w-full">Terminal</button>
        </div>
    </div>

    <!-- HUD -->
    <div class="ui-layer" id="hud" style="display: none;">
        <div class="flex justify-between items-start w-full pointer-events-none">
            <div class="flex flex-col gap-3">
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] uppercase font-bold tracking-widest text-pink-500"><span>Integrity</span><span id="hp-val">100%</span></div>
                    <div class="hud-bar"><div id="hp-fill" class="bar-fill" style="width: 100%;"></div></div>
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-[10px] uppercase font-bold tracking-widest text-blue-400"><span>Shield</span><span id="shield-val">0%</span></div>
                    <div class="hud-bar"><div id="shield-fill" class="bar-fill" style="width: 0%;"></div></div>
                </div>
                <div id="powerup-timer-container" class="mt-2 hidden">
                    <div class="text-[9px] text-yellow-400 font-bold uppercase tracking-widest mb-1" id="powerup-label">Overdrive</div>
                    <div class="hud-bar h-1 w-24 bg-black/40"><div id="powerup-fill" class="h-full bg-yellow-400"></div></div>
                </div>
            </div>
            
            <div class="flex flex-col items-center">
                <div id="score-container" class="orbitron text-4xl font-black neon-text-blue">000000</div>
                <div class="currency-display text-base mt-1 tracking-[0.2em] font-bold"><i class="fas fa-coins mr-1"></i> <span id="hud-coins">0</span></div>
            </div>

            <div class="flex flex-col items-end gap-2">
                <div class="text-2xl font-black text-white orbitron bg-white/5 px-4 py-1 rounded-sm skew-x-[-10deg]" id="level-display">LVL 01</div>
                <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">THREAT: <span id="wave-progress" class="text-red-500">1</span></div>
                <div class="text-[9px] text-purple-400 uppercase font-black tracking-tighter" id="bot-status"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        const hpFill = document.getElementById('hp-fill');
        const shieldFill = document.getElementById('shield-fill');
        const hpVal = document.getElementById('hp-val');
        const shieldVal = document.getElementById('shield-val');
        const scoreEl = document.getElementById('score-container');
        const hudCoins = document.getElementById('hud-coins');
        const levelEl = document.getElementById('level-display');
        const menu = document.getElementById('main-menu');
        const lobby = document.getElementById('lobby-menu');
        const gameOverScreen = document.getElementById('game-over');
        const hud = document.getElementById('hud');
        const waveAlert = document.getElementById('wave-alert');
        const powerupTimer = document.getElementById('powerup-timer-container');
        const powerupFill = document.getElementById('powerup-fill');

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'neon-overdrive-v2';
        let stats = {
            coins: parseInt(localStorage.getItem(appId + '_coins')) || 0,
            upgrades: JSON.parse(localStorage.getItem(appId + '_upgrades')) || {
                hp: 1, fire: 1, speed: 1, shield: 1, magnet: 1, damage: 1
            },
            botTech: JSON.parse(localStorage.getItem(appId + '_bottech')) || {
                unlocked: false, count: 1, hp: 1, damage: 1
            }
        };

        const upgradeData = [
            { id: 'hp', title: 'Hull Plating', desc: 'Increases maximum durability.', baseCost: 500 },
            { id: 'fire', title: 'Pulse Capacitor', desc: 'Reduces weapon recharge delay.', baseCost: 750 },
            { id: 'speed', title: 'Ion Thrusters', desc: 'Increases maneuverability.', baseCost: 400 },
            { id: 'shield', title: 'Hardlight Shield', desc: 'Auto-regenerating energy barrier.', baseCost: 600 },
            { id: 'magnet', title: 'Void Magnet', desc: 'Attracts credits from distance.', baseCost: 1000 },
            { id: 'damage', title: 'Neutron Slugs', desc: 'Higher impact projectile force.', baseCost: 800 },
        ];

        const botUpgradeData = [
            { id: 'count', title: 'Drone Squad', desc: 'Increases active bot limit.', baseCost: 2000 },
            { id: 'hp', title: 'Drone Armor', desc: 'Increases drone durability.', baseCost: 1000 },
            { id: 'damage', title: 'Drone Ordnance', desc: 'Higher drone firepower.', baseCost: 1500 },
        ];

        let isRunning = false;
        let score = 0;
        let sessionCoins = 0;
        let level = 1;
        let shake = 0;
        let frameCount = 0;
        let lastTime = 0;
        let gridOffset = 0;

        let player = null;
        let projectiles = [];
        let enemies = [];
        let particles = [];
        let pickups = [];
        let bots = [];
        let botRespawnQueue = [];
        let enemySpawnTimer = 0;

        const keys = {};
        const mouse = { x: 0, y: 0, down: false };
        const isTouch = ('ontouchstart' in window);

        const moveJoy = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, dirX: 0, dirY: 0 };
        const aimJoy = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, dirX: 0, dirY: 0 };

        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playS(f, t, d, v = 0.1, r = true) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            if (r) o.frequency.exponentialRampToValueAtTime(f / 4, audioCtx.currentTime + d);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        const sfx = {
            shoot: () => playS(400, 'square', 0.08, 0.02),
            hit: () => playS(150, 'sawtooth', 0.15, 0.05, false),
            explosion: () => playS(70, 'sawtooth', 0.4, 0.1),
            pickup: () => { playS(800, 'sine', 0.15, 0.08); setTimeout(()=>playS(1200, 'sine', 0.15, 0.08), 40); },
            upgrade: () => playS(600, 'sine', 0.5, 0.1)
        };

        const dist = (x1, y1, x2, y2) => Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        
        function saveStats() {
            localStorage.setItem(appId + '_coins', stats.coins);
            localStorage.setItem(appId + '_upgrades', JSON.stringify(stats.upgrades));
            localStorage.setItem(appId + '_bottech', JSON.stringify(stats.botTech));
            updateLobbyUI();
        }

        function showWaveAlert(n) {
            waveAlert.innerText = `PHASE ${n}`;
            waveAlert.classList.remove('animate-wave');
            void waveAlert.offsetWidth;
            waveAlert.classList.add('animate-wave');
        }

        function switchTab(tab) {
            if (tab === 'bots' && !stats.botTech.unlocked) return;
            document.getElementById('player-upgrades').style.display = tab === 'player' ? 'grid' : 'none';
            document.getElementById('bot-upgrades').style.display = tab === 'bots' ? 'grid' : 'none';
            document.getElementById('tab-player').classList.toggle('active', tab === 'player');
            document.getElementById('tab-bots').classList.toggle('active', tab === 'bots');
        }

        function updateLobbyUI() {
            document.getElementById('global-coins').innerText = stats.coins.toLocaleString();
            document.getElementById('lobby-coins').innerText = stats.coins.toLocaleString();
            
            const pCont = document.getElementById('player-upgrades');
            pCont.innerHTML = '';
            upgradeData.forEach(up => {
                const level = stats.upgrades[up.id];
                const cost = level * up.baseCost;
                pCont.innerHTML += `
                    <div class="upgrade-card">
                        <div class="flex justify-between items-center"><span class="font-bold uppercase text-sm">${up.title}</span><span class="text-blue-400 font-bold">LVL ${level}</span></div>
                        <p class="text-[11px] text-slate-400 leading-snug">${up.desc}</p>
                        <button onclick="buyUpgrade('${up.id}')" ${stats.coins < cost ? 'disabled' : ''} class="neon-btn text-xs py-2 mt-2">Cost: ${cost}</button>
                    </div>`;
            });

            if (!stats.botTech.unlocked) {
                pCont.innerHTML += `
                    <div class="upgrade-card border-purple-500/50">
                        <div class="flex justify-between items-center"><span class="font-bold uppercase text-sm text-purple-400">Drone Uplink</span><span class="text-purple-400 font-bold">LOCKED</span></div>
                        <button onclick="buyBotUnlock()" ${stats.coins < 2500 ? 'disabled' : ''} class="neon-btn text-xs py-2 mt-2 border-purple-500 text-purple-500">Enable: 2500</button>
                    </div>`;
            }

            const bCont = document.getElementById('bot-upgrades');
            bCont.innerHTML = '';
            botUpgradeData.forEach(up => {
                const level = stats.botTech[up.id];
                const cost = level * up.baseCost;
                bCont.innerHTML += `
                    <div class="upgrade-card">
                        <div class="flex justify-between items-center"><span class="font-bold uppercase text-sm text-purple-400">${up.title}</span><span class="text-purple-400 font-bold">LVL ${level}</span></div>
                        <p class="text-[11px] text-slate-400 leading-snug">${up.desc}</p>
                        <button onclick="buyBotUpgrade('${up.id}')" ${stats.coins < cost ? 'disabled' : ''} class="neon-btn text-xs py-2 mt-2 border-purple-500 text-purple-500">Cost: ${cost}</button>
                    </div>`;
            });

            if (stats.botTech.unlocked) document.getElementById('lock-icon').style.display = 'none';
        }

        function buyUpgrade(type) {
            const data = upgradeData.find(d => d.id === type);
            let cost = stats.upgrades[type] * data.baseCost;
            if (stats.coins >= cost) { stats.coins -= cost; stats.upgrades[type]++; saveStats(); sfx.upgrade(); }
        }

        function buyBotUnlock() {
            if (stats.coins >= 2500) { stats.coins -= 2500; stats.botTech.unlocked = true; saveStats(); sfx.upgrade(); }
        }

        function buyBotUpgrade(type) {
            const data = botUpgradeData.find(d => d.id === type);
            let cost = stats.botTech[type] * data.baseCost;
            if (stats.coins >= cost) { stats.coins -= cost; stats.botTech[type]++; saveStats(); sfx.upgrade(); }
        }

        function openLobby() { initAudio(); menu.style.display = 'none'; lobby.style.display = 'flex'; updateLobbyUI(); }
        function closeLobby() { lobby.style.display = 'none'; menu.style.display = 'flex'; }

        class Player {
            constructor() {
                this.x = canvas.width / 2; this.y = canvas.height / 2; this.radius = 18;
                this.maxHp = 100 + (stats.upgrades.hp - 1) * 25;
                this.hp = this.maxHp;
                this.maxShield = (stats.upgrades.shield - 1) * 40;
                this.shield = this.maxShield;
                this.baseSpeed = 4.5 + (stats.upgrades.speed - 1) * 0.45;
                this.fireRate = Math.max(5, 12 - (stats.upgrades.fire - 1));
                this.magnetRadius = 80 + (stats.upgrades.magnet - 1) * 45;
                this.dmgMult = 1 + (stats.upgrades.damage - 1) * 0.4;
                this.angle = 0; this.lastShot = 0; 
                this.overdrive = 0; this.tripleShot = 0; this.lastRegen = 0;
            }
            update(dt) {
                let dx = 0, dy = 0;
                if (isTouch) { dx = moveJoy.dirX; dy = moveJoy.dirY; }
                else {
                    if (keys['KeyW'] || keys['ArrowUp']) dy -= 1; 
                    if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
                    if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1; 
                    if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
                }
                if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; }
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x + dx * this.baseSpeed * dt));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y + dy * this.baseSpeed * dt));
                
                if (isTouch && aimJoy.active) { this.angle = Math.atan2(aimJoy.dirY, aimJoy.dirX); mouse.down = true; }
                else if (!isTouch) { this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x); }

                if (this.overdrive > 0) this.overdrive -= dt;
                if (this.tripleShot > 0) this.tripleShot -= dt;

                const currentFR = this.overdrive > 0 ? this.fireRate * 0.4 : this.fireRate;
                if (mouse.down && frameCount - this.lastShot >= currentFR) { this.shoot(); this.lastShot = frameCount; }

                if (this.overdrive > 0 || this.tripleShot > 0) {
                    powerupTimer.classList.remove('hidden');
                    const time = Math.max(this.overdrive, this.tripleShot);
                    powerupFill.style.width = (time / 400) * 100 + '%';
                    document.getElementById('powerup-label').innerText = this.overdrive > 0 ? 'Rapid Fire' : 'Triple Strike';
                } else { powerupTimer.classList.add('hidden'); }

                if (this.maxShield > 0 && frameCount - this.lastRegen > 60 && this.shield < this.maxShield) {
                    this.shield = Math.min(this.maxShield, this.shield + (0.05 * dt));
                    this.lastRegen = frameCount;
                }
                hpFill.style.width = `${(this.hp / this.maxHp) * 100}%`;
                hpVal.innerText = `${Math.ceil((this.hp / this.maxHp) * 100)}%`;
                shieldFill.style.width = this.maxShield > 0 ? `${(this.shield / this.maxShield) * 100}%` : '0%';
                shieldVal.innerText = this.maxShield > 0 ? `${Math.ceil((this.shield / this.maxShield) * 100)}%` : 'OFF';
            }
            takeDamage(d) {
                this.lastRegen = frameCount + 120;
                if (this.shield > 0) { this.shield -= d; if (this.shield < 0) { this.hp += this.shield; this.shield = 0; } }
                else { this.hp -= d; }
                shake = 12; sfx.hit();
            }
            shoot() { 
                if (this.tripleShot > 0) {
                    projectiles.push(new Projectile(this.x, this.y, this.angle, true, this.dmgMult));
                    projectiles.push(new Projectile(this.x, this.y, this.angle - 0.2, true, this.dmgMult));
                    projectiles.push(new Projectile(this.x, this.y, this.angle + 0.2, true, this.dmgMult));
                } else { projectiles.push(new Projectile(this.x, this.y, this.angle, true, this.dmgMult)); }
                sfx.shoot(); 
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                if (this.shield > 0) {
                    ctx.beginPath(); ctx.arc(0, 0, this.radius + 12, 0, Math.PI*2);
                    ctx.strokeStyle = `rgba(0, 243, 255, ${0.2 + Math.sin(frameCount*0.1)*0.1})`; 
                    ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.rotate(this.angle);
                ctx.shadowBlur = 15; ctx.shadowColor = '#00f3ff'; ctx.fillStyle = '#00f3ff';
                ctx.beginPath(); ctx.moveTo(22, 0); ctx.lineTo(-12, -14); ctx.lineTo(-6, 0); ctx.lineTo(-12, 14); ctx.closePath(); ctx.fill();
                ctx.restore();
            }
        }

        class Bot {
            constructor(index) {
                this.index = index;
                this.radius = 10;
                this.maxHp = 60 + (stats.botTech.hp - 1) * 25;
                this.hp = this.maxHp;
                this.dmgMult = 0.6 + (stats.botTech.damage - 1) * 0.35;
                this.fireRate = 50; this.lastShot = 0;
                this.x = player.x; this.y = player.y;
                
                // Bot Típusok: 0: Orbiter, 1: Roamer, 2: Rammer
                this.type = index % 3;
                this.orbitDist = 60;
                this.angleOffset = (Math.PI * 2 / stats.botTech.count) * index;
                
                // Roamer adatok
                this.targetPos = { x: Math.random() * canvas.width, y: Math.random() * canvas.height };
                this.roamTimer = 0;
            }
            update(dt) {
                if (this.type === 0) { // Orbiter: Kering a játékos körül
                    const tx = player.x + Math.cos(frameCount * 0.04 + this.angleOffset) * this.orbitDist;
                    const ty = player.y + Math.sin(frameCount * 0.04 + this.angleOffset) * this.orbitDist;
                    this.x += (tx - this.x) * 0.12 * dt;
                    this.y += (ty - this.y) * 0.12 * dt;
                } 
                else if (this.type === 1) { // Roamer: Véletlenszerű mozgás
                    const dToTarget = dist(this.x, this.y, this.targetPos.x, this.targetPos.y);
                    if (dToTarget < 20 || this.roamTimer <= 0) {
                        this.targetPos = { x: Math.random() * canvas.width, y: Math.random() * canvas.height };
                        this.roamTimer = 300;
                    }
                    const a = Math.atan2(this.targetPos.y - this.y, this.targetPos.x - this.x);
                    this.x += Math.cos(a) * 3 * dt;
                    this.y += Math.sin(a) * 3 * dt;
                    this.roamTimer -= dt;
                }
                else { // Rammer (Interceptor): Közvetlen támadás
                    let near = null, md = 500;
                    enemies.forEach(e => { 
                        const d = dist(this.x, this.y, e.x, e.y); 
                        if (d < md) { md = d; near = e; } 
                    });
                    if (near) {
                        const a = Math.atan2(near.y - this.y, near.x - this.x);
                        this.x += Math.cos(a) * 6 * dt;
                        this.y += Math.sin(a) * 6 * dt;
                        if (md < this.radius + near.radius) {
                            near.hp -= 20 * this.dmgMult;
                            this.hp -= 10; // Ramming damage a botnak is
                            if (frameCount % 10 === 0) sfx.hit();
                        }
                    } else {
                        // Ha nincs ellenség, visszatér a játékoshoz
                        const a = Math.atan2(player.y - this.y, player.x - this.x);
                        this.x += Math.cos(a) * 4 * dt; this.y += Math.sin(a) * 4 * dt;
                    }
                }

                // Lövöldözés (csak az Orbiter és Roamer lő)
                if (this.type !== 2) {
                    let nearShoot = null, mdShoot = 350;
                    enemies.forEach(e => { 
                        const d = dist(this.x, this.y, e.x, e.y); 
                        if (d < mdShoot) { mdShoot = d; nearShoot = e; } 
                    });
                    if (nearShoot && frameCount - this.lastShot > this.fireRate) {
                        const a = Math.atan2(nearShoot.y - this.y, nearShoot.x - this.x);
                        projectiles.push(new Projectile(this.x, this.y, a, true, this.dmgMult));
                        this.lastShot = frameCount; 
                        if (frameCount % 5 === 0) sfx.shoot();
                    }
                }
            }
            draw() {
                const colors = ['#bc13fe', '#39ff14', '#ff8c00'];
                ctx.save(); ctx.translate(this.x, this.y); 
                ctx.shadowBlur = 10; ctx.shadowColor = colors[this.type]; ctx.fillStyle = colors[this.type];
                ctx.beginPath(); 
                if (this.type === 2) { // Rammer egy háromszög
                    ctx.rotate(frameCount * 0.1);
                    ctx.moveTo(12, 0); ctx.lineTo(-8, -8); ctx.lineTo(-8, 8);
                } else {
                    ctx.arc(0, 0, this.radius, 0, Math.PI*2);
                }
                ctx.fill();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, 3, 0, 7); ctx.fill();
                ctx.restore();
            }
        }

        class Enemy {
            constructor(x, y, typeIndex) {
                this.x = x; this.y = y; this.type = typeIndex;
                const types = [
                    { r: 18, hp: 2, s: 2.2, c: '#bc13fe', shoot: false, val: 10 },
                    { r: 14, hp: 1, s: 4.8, c: '#fff200', shoot: false, val: 15 },
                    { r: 35, hp: 18, s: 1.1, c: '#ff0055', shoot: false, val: 40 },
                    { r: 22, hp: 4, s: 1.6, c: '#00f3ff', shoot: true, fr: 110, val: 25 },
                    { r: 20, hp: 4, s: 1.0, c: '#39ff14', shoot: true, fr: 200, sniper: true, val: 50 },
                    { r: 75, hp: 300, s: 0.4, c: '#ffffff', shoot: true, fr: 50, boss: true, val: 1000 }
                ];
                const t = types[Math.min(this.type, types.length - 1)];
                this.radius = t.r; this.hp = t.hp + (level * 2); this.speed = t.s; this.color = t.c;
                this.canShoot = t.shoot; this.fireRate = t.fr; this.lastShot = Math.random()*100;
                this.isBoss = t.boss; this.coinValue = t.val;
            }
            update(dt) {
                let target = player, md = dist(this.x, this.y, player.x, player.y);
                bots.forEach(b => { let d = dist(this.x, this.y, b.x, b.y); if (d < md) { md = d; target = b; } });
                const a = Math.atan2(target.y - this.y, target.x - this.x);
                
                if (this.canShoot && md < 500) {
                    if (md > 250) { this.x += Math.cos(a) * this.speed * dt; this.y += Math.sin(a) * this.speed * dt; }
                    if (frameCount - this.lastShot > this.fireRate) { this.shoot(a); this.lastShot = frameCount; }
                } else { 
                    this.x += Math.cos(a) * this.speed * dt; this.y += Math.sin(a) * this.speed * dt; 
                }

                if (md < this.radius + target.radius) {
                    if (target === player) player.takeDamage(15); else target.hp -= 20;
                    this.hp = 0; createExplosion(this.x, this.y, this.color, 10);
                }
            }
            shoot(a) {
                if (this.isBoss) { for(let i=0; i<8; i++) projectiles.push(new Projectile(this.x, this.y, a + (i * Math.PI/4), false)); }
                else { projectiles.push(new Projectile(this.x, this.y, a, false)); }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); 
                ctx.rotate(frameCount * 0.05); ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.strokeStyle = this.color; ctx.lineWidth = 3;
                ctx.beginPath();
                const sides = this.isBoss ? 12 : (this.type === 4 ? 3 : 4);
                for(let i=0; i<sides; i++) ctx.lineTo(Math.cos(i*(Math.PI*2/sides))*this.radius, Math.sin(i*(Math.PI*2/sides))*this.radius);
                ctx.closePath(); ctx.stroke(); ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, a, isP, dmg = 1) {
                this.x = x; this.y = y; this.speed = isP ? 16 : 8;
                this.vx = Math.cos(a) * this.speed; this.vy = Math.sin(a) * this.speed;
                this.radius = isP ? 4 : 5; this.isPlayer = isP; this.life = 100; this.damage = dmg;
            }
            update(dt) {
                this.x += this.vx * dt; this.y += this.vy * dt; this.life -= dt;
                if (this.isPlayer) {
                    enemies.forEach(e => {
                        if (dist(this.x, this.y, e.x, e.y) < e.radius + this.radius) {
                            e.hp -= this.damage; this.life = 0; 
                            if (e.hp <= 0) {
                                score += 100; sessionCoins += e.coinValue; sfx.explosion(); 
                                createExplosion(e.x, e.y, e.color, e.isBoss ? 40 : 15);
                                if (Math.random() < 0.2) pickups.push(new Pickup(e.x, e.y, Math.random() < 0.4 ? 'H' : (Math.random() < 0.7 ? 'O' : 'T')));
                                checkLevel();
                            }
                        }
                    });
                } else {
                    let targets = [player, ...bots];
                    targets.forEach(t => {
                        if (dist(this.x, this.y, t.x, t.y) < t.radius + this.radius) {
                            if (t === player) player.takeDamage(10); else t.hp -= 15;
                            this.life = 0;
                        }
                    });
                }
            }
            draw() {
                ctx.shadowBlur = 10; ctx.shadowColor = this.isPlayer ? '#00f3ff' : '#ff00ff'; ctx.fillStyle = this.isPlayer ? '#fff' : '#ff00ff';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, 7); ctx.fill();
            }
        }

        class Pickup {
            constructor(x, y, type) { this.x = x; this.y = y; this.type = type; this.radius = 12; this.life = 600; }
            update(dt) {
                const d = dist(this.x, this.y, player.x, player.y);
                if (d < player.magnetRadius) { const a = Math.atan2(player.y - this.y, player.x - this.x); this.x += Math.cos(a) * 9 * dt; this.y += Math.sin(a) * 9 * dt; }
                if (d < this.radius + player.radius) {
                    sfx.pickup(); 
                    if (this.type === 'H') player.hp = Math.min(player.maxHp, player.hp + (player.maxHp * 0.25)); 
                    else if (this.type === 'O') player.overdrive = 400;
                    else if (this.type === 'T') player.tripleShot = 400;
                    return true;
                }
                this.life -= dt; return this.life <= 0;
            }
            draw() {
                const colors = { H: '#39ff14', O: '#fff200', T: '#ff00ff' };
                ctx.save(); ctx.translate(this.x, this.y); ctx.fillStyle = colors[this.type]; 
                ctx.shadowBlur = 15; ctx.shadowColor = colors[this.type]; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, 7); ctx.fill();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, c) { this.x = x; this.y = y; this.c = c; this.vx = (Math.random()-0.5)*12; this.vy = (Math.random()-0.5)*12; this.life = 1.0; }
            update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.life -= 0.03 * dt; }
            draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.c; ctx.fillRect(this.x, this.y, 2, 2); ctx.globalAlpha = 1; }
        }

        function createExplosion(x, y, c, count = 10) { for(let i=0; i<count; i++) particles.push(new Particle(x, y, c)); }

        function checkLevel() {
            const next = Math.floor(score / 5000) + 1;
            if (next > level) { level = next; levelEl.innerText = `LVL ${level.toString().padStart(2, '0')}`; showWaveAlert(level); }
            scoreEl.innerText = score.toString().padStart(6, '0');
            hudCoins.innerText = sessionCoins.toLocaleString();
            document.getElementById('wave-progress').innerText = level;
        }

        function spawn() {
            enemySpawnTimer--;
            if (enemySpawnTimer <= 0) {
                const s = Math.floor(Math.random()*4); let x, y;
                if(s===0){x=Math.random()*canvas.width; y=-50;} 
                else if(s===1){x=canvas.width+50; y=Math.random()*canvas.height;}
                else if(s===2){x=Math.random()*canvas.width; y=canvas.height+50;} 
                else {x=-50; y=Math.random()*canvas.height;}
                let typeRange = Math.min(4, Math.floor(level / 2));
                if (level % 5 === 0 && enemies.filter(e => e.isBoss).length === 0) enemies.push(new Enemy(canvas.width/2, -100, 5));
                else enemies.push(new Enemy(x, y, Math.floor(Math.random() * (typeRange + 1))));
                enemySpawnTimer = Math.max(15, 80 - level * 4);
            }
        }

        function startGame() {
            initAudio(); player = new Player(); enemies = []; projectiles = []; particles = []; pickups = []; bots = []; botRespawnQueue = [];
            if (stats.botTech.unlocked) { for (let i = 0; i < stats.botTech.count; i++) bots.push(new Bot(i)); }
            score = 0; sessionCoins = 0; level = 1; isRunning = true; lastTime = performance.now();
            menu.style.display = 'none'; gameOverScreen.style.display = 'none'; hud.style.display = 'flex';
            if (isTouch) { document.getElementById('move-joystick').style.display = 'block'; document.getElementById('aim-joystick').style.display = 'block'; }
            showWaveAlert(1);
        }

        function endGame() {
            isRunning = false; stats.coins += sessionCoins; saveStats();
            document.getElementById('final-score').innerText = score.toLocaleString();
            document.getElementById('session-coins').innerText = `+${sessionCoins.toLocaleString()} CREDITS`;
            gameOverScreen.style.display = 'flex'; setTimeout(()=>gameOverScreen.style.opacity = '1', 50); hud.style.display = 'none';
        }

        function returnToMenu() { gameOverScreen.style.display='none'; menu.style.display='flex'; updateLobbyUI(); }

        function loop(timestamp) {
            const dt = (timestamp - lastTime) / (1000 / 60); // 60 FPS alapú delta
            lastTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isRunning) {
                frameCount++; spawn();
                
                // Bot Respawn kezelő (10 sec = 600 frame 60FPS-nél)
                botRespawnQueue.forEach((item, idx) => {
                    item.timer -= dt;
                    if (item.timer <= 0) {
                        bots.push(new Bot(item.index));
                        botRespawnQueue.splice(idx, 1);
                    }
                });

                ctx.save(); if(shake > 0){ ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.85; }
                
                player.update(dt); player.draw();
                
                bots.forEach((b, i) => { 
                    b.update(dt); b.draw(); 
                    if (b.hp <= 0) { 
                        createExplosion(b.x, b.y, '#bc13fe', 20); 
                        botRespawnQueue.push({ index: b.index, timer: 600 }); // 10 sec respawn
                        bots.splice(i, 1); sfx.explosion(); 
                    } 
                });
                
                if (stats.botTech.unlocked) document.getElementById('bot-status').innerText = `Drones: ${bots.length}/${stats.botTech.count} (Wait: ${botRespawnQueue.length})`;
                
                enemies.forEach((e, i) => { e.update(dt); e.draw(); if(e.hp <= 0) enemies.splice(i,1); });
                projectiles.forEach((p, i) => { p.update(dt); p.draw(); if(p.life <= 0) projectiles.splice(i,1); });
                pickups.forEach((p, i) => { if(p.update(dt)) pickups.splice(i,1); else p.draw(); });
                particles.forEach((p, i) => { p.update(dt); p.draw(); if(p.life <= 0) particles.splice(i,1); });
                
                ctx.restore(); if(player.hp <= 0) endGame();
            }
            requestAnimationFrame(loop);
        }

        window.onkeydown = e => keys[e.code] = true; window.onkeyup = e => keys[e.code] = false;
        window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.onmousedown = () => mouse.down = true; window.onmouseup = () => mouse.down = false;
        if (isTouch) {
            const joyFn = (e, joy, isMove) => {
                const t = e.changedTouches[0];
                const rect = (isMove ? document.getElementById('move-joystick') : document.getElementById('aim-joystick')).getBoundingClientRect();
                if (t.clientX >= rect.left && t.clientX <= rect.right && t.clientY >= rect.top && t.clientY <= rect.bottom) {
                    joy.active = true; joy.startX = rect.left + 60; joy.startY = rect.top + 60;
                }
            };
            window.addEventListener('touchstart', e => { joyFn(e, moveJoy, true); joyFn(e, aimJoy, false); });
            window.addEventListener('touchmove', e => {
                for (let t of e.touches) {
                    if (t.clientX < window.innerWidth/2 && moveJoy.active) {
                        moveJoy.dirX = Math.max(-1, Math.min(1, (t.clientX - moveJoy.startX)/40));
                        moveJoy.dirY = Math.max(-1, Math.min(1, (t.clientY - moveJoy.startY)/40));
                    } else if (t.clientX >= window.innerWidth/2 && aimJoy.active) {
                        aimJoy.dirX = Math.max(-1, Math.min(1, (t.clientX - aimJoy.startX)/40));
                        aimJoy.dirY = Math.max(-1, Math.min(1, (t.clientY - aimJoy.startY)/40));
                    }
                }
            });
            window.addEventListener('touchend', () => { moveJoy.active = false; moveJoy.dirX = 0; moveJoy.dirY = 0; aimJoy.active = false; mouse.down = false; });
        }
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize(); requestAnimationFrame(loop); updateLobbyUI();
    </script>
</body>
