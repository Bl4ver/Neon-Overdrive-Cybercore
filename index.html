<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Overdrive</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="./js/main.js" type="modul" defer></script>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud" class="ui-screen hidden">
            <div class="stats-top">
                <div id="score">000000</div>
                <div id="money-display">Credits: <span id="credits-val">0</span></div>
            </div>
            <div class="bars-bottom">
                <div class="bar-container">
                    <label>INTEGRITY</label>
                    <div class="bar">
                        <div id="hp-fill" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="bar-container">
                    <label>SHIELD</label>
                    <div class="bar shield">
                        <div id="shield-fill" style="width: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <section id="main-menu" class="ui-screen active">
            <h1 id="menu-title">NEON</h1>
            <h2 id="menu-altTitle">Overdrive</h2>            
            <div id="menu-buttons">
                <button id="btn-start" class="button-menu">GAME MODES</button>
                <button id="btn-upgrades" class="button-menu">UPGRADES</button>
                <button id="btn-statistic" class="button-menu">STATISTIC</button>
                <button id="btn-encyclopedia" class="button-menu">ENCYCLOPEDIA</button>
                <button id="btn-settings" class="button-menu">SETTINGS</button>
            </div>
        </section>

        <section id="settings-screen" class="ui-screen hidden">
            <h2>SETTINGS</h2>
            <div class="setting-item">
                <label>LANGUAGE</label>
                <select id="lang-select">
                    <option value="hu">Magyar</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="setting-item">
                <label>MASTER VOLUME</label>
                <input type="range" id="vol-slider" min="0" max="100">
            </div>
            <button class="back-btn">BACK</button>
        </section>

        <section id="upgrade-screen" class="ui-screen hidden">
            <h2>BOT COMMANDER</h2>
            <div class="inventory-layout">
                <div id="bot-slots">
                </div>
                <div id="item-details">
                </div>
            </div>
            <button class="back-btn">BACK</button>
        </section>

        <section id="statistic-screen" class="ui-screen hidden">
            <h2>STATISTIC</h2>
            <div>
            </div>
            <button class="back-btn">BACK</button>
        </section>


        <section id="encyclopedia-screen" class="ui-screen hidden">
            <h2>ENCYCLOPEDIA</h2>
            <div>
            </div>
            <button class="back-btn">BACK</button>
        </section>

    </div>
</body>

</html>
